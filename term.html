<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Term Definition | Digital Twin & ROM</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
  <script src="scripts.js" defer></script>
  <style>
    /* PREMIUM LIGHT THEME */
    :root {
      --bg-page: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --accent-primary: #3b82f6;
      --accent-secondary: #8b5cf6;
      --border-color: #e2e8f0;
    }
    body {
      background-color: var(--bg-page);
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      color: var(--text-main);
    }
    
    .badge { background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); padding: 5px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; border: 1px solid rgba(59,130,246,0.2); }
    .section-title { font-size: 3.5rem !important; margin-bottom: 20px; font-weight: 900; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    
    header { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(12px) !important; border-bottom: 1px solid var(--border-color) !important; }
    .logo span { color: var(--text-main) !important; }
    .nav-links a { color: var(--text-sub) !important; }
    .nav-links a:hover, .nav-links a[style*="color: var(--accent)"] { color: var(--accent-primary) !important; }
    .footer { border-top: 1px solid var(--border-color); background: var(--bg-page); color: var(--text-sub); }

    .markdown-body { color: var(--text-main) !important; background: transparent !important; }
    .markdown-body p { color: var(--text-sub) !important; font-size: 1.15rem; line-height: 1.8; margin-bottom: 20px; }
    .markdown-body h2 { color: var(--text-main) !important; border-bottom: 1px solid var(--border-color) !important; padding-bottom: 10px; margin-top: 40px; }
    .markdown-body h3 { color: var(--text-main) !important; margin-top: 30px; }
    .card-link { color: var(--accent-primary); font-weight: 700; text-decoration: none; transition: opacity 0.3s ease; }
    .card-link:hover { opacity: 0.8; }
  </style>
</head>
<body>

  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-cube"></i>
        <span>Digital Twin [ROM]</span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="home-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a href="overview.html"><i class="fa-solid fa-file-invoice"></i> <span>Abstract</span></a>
        <a href="repository.html"><i class="fa-solid fa-folder-open"></i> <span>Files</span></a>
        <a href="timeline.html"><i class="fa-solid fa-calendar-alt"></i> <span>Timeline</span></a>
        <a href="tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a>
        <a href="dictionary.html"><i class="fa-solid fa-book-bookmark"></i> <span>Dictionary</span></a>
        <a href="https://github.com/WEHBEMUMEN/internship-cnam" target="_blank" class="github-link btn btn-outline" style="padding: 10px 20px; font-size: 0.9rem;">
          <i class="fa-brands fa-github"></i> <span>GitHub</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div id="term-content" class="reveal reveal-up">
           <div class="loading-msg">Loading term details...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 WEHBE Mumen & EPN04, Cnam.</p>
    </div>
  </footer>

  <script>
    async function loadTerm() {
      const urlParams = new URLSearchParams(window.location.search);
      const termId = urlParams.get('id');
      const content = document.getElementById('term-content');

      if (!termId) {
        content.innerHTML = '<h2>Select a term from the <a href="dictionary.html">dictionary</a>.</h2>';
        return;
      }

      try {
        const res = await fetch(`_data/dictionary/${termId}.json`);
        if (!res.ok) throw new Error('Term not found');
        const data = await res.json();
        
        document.title = `${data.title} | Project Dictionary`;

        let bodyText = data.body.replace(/\\n/g, '\n');
        const mathBlocks = [];
        bodyText = bodyText.replace(/\$\$[\s\S]*?\$\$|\$.*?\$/g, (match) => {
          mathBlocks.push(match);
          return `@@@MATHBLOCK${mathBlocks.length - 1}@@@`;
        });
        
        let parsedHtml = marked.parse(bodyText);
        mathBlocks.forEach((block, i) => {
          parsedHtml = parsedHtml.replace(`@@@MATHBLOCK${i}@@@`, block);
        });

        content.innerHTML = `
          <div class="section-head" style="text-align: left; margin-bottom: 40px;">
            <a href="dictionary.html" class="card-link" style="margin-bottom: 20px; display: inline-flex;"><i class="fa-solid fa-arrow-left"></i> Back to Dictionary</a>
            <span class="badge" style="display: block; width: fit-content;">${data.category}</span>
            <h1 class="section-title" style="font-size: 3.5rem; margin-top: 10px;">${data.title}</h1>
          </div>
          
          <div class="markdown-body" style="background: white; border: none; padding: 0;">
            ${parsedHtml}
          </div>

          ${data.related && data.related.length > 0 ? `
            <div style="margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--border);">
              <h3 style="margin-bottom: 20px;">Related Terms</h3>
              <div class="nav-links" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start;">
                ${data.related.map(r => `
                  <a href="term.html?id=${r.slug.toLowerCase().replace(/ /g, '-')}" class="btn btn-outline" style="padding: 8px 16px; font-size: 0.85rem;">${r.slug}</a>
                `).join('')}
              </div>
            </div>
          ` : ''}
        `;
      } catch (e) {
        content.innerHTML = `<h2>Error: ${e.message}</h2><p>Go back to the <a href="dictionary.html">dictionary</a>.</p>`;
      }

      setTimeout(() => {
        if (window.renderMathInElement) {
          window.renderMathInElement(document.body, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ],
            throwOnError: false
          });
        }
      }, 100);

      if (window.initRevealAnimations) {
        window.initRevealAnimations();
      }
    }

    loadTerm();
  </script>

</body>
</html>
