<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Log | Digital Twin & ROM</title>
  <link rel="stylesheet" href="../index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .markdown-container {
      max-width: 850px;
      margin: 40px auto;
      padding: 40px;
      background: var(--card-bg, #1e293b);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .markdown-body h1 { font-size: 2.2rem; margin-bottom: 24px; border-bottom: 2px solid var(--accent, #3b82f6); padding-bottom: 12px; }
    .markdown-body h2 { font-size: 1.6rem; margin-top: 40px; margin-bottom: 16px; color: var(--accent, #3b82f6); }
    .markdown-body h3 { font-size: 1.2rem; margin-top: 24px; margin-bottom: 12px; }
    .markdown-body p { line-height: 1.7; color: var(--text-secondary, #94a3b8); margin-bottom: 16px; }
    .markdown-body ul { margin-bottom: 20px; padding-left: 20px; }
    .markdown-body li { margin-bottom: 10px; color: var(--text-secondary, #94a3b8); }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 24px 0; background: rgba(0,0,0,0.2); border-radius: 12px; overflow: hidden; }
    .markdown-body th, .markdown-body td { padding: 12px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .markdown-body th { background: rgba(255,255,255,0.05); color: var(--text-primary, #f1f5f9); font-weight: 700; }
    .markdown-body strong { color: var(--text-primary, #f1f5f9); }
    .markdown-body blockquote { border-left: 4px solid var(--accent, #3b82f6); padding-left: 20px; margin: 20px 0; font-style: italic; color: var(--text-primary, #f1f5f9); }
    .markdown-body pre { background: rgba(0,0,0,0.4); padding: 16px; border-radius: 8px; overflow-x: auto; margin: 20px 0; }
    .markdown-body code { font-family: 'Inter', monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }
    .markdown-body .task-list-item { list-style-type: none; padding-left: 0; }
    .markdown-body input[type="show"] { display: none; }
    .loading-spinner { text-align: center; font-size: 1.2rem; color: var(--text-secondary, #94a3b8); margin-top: 100px; }
  </style>
</head>
<body>

  <header>
    <div class="container header-container">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-cube"></i>
        <span>Digital Twin [ROM]</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a href="../overview.html"><i class="fa-solid fa-file-invoice"></i> <span>Abstract</span></a>
        <a href="../repository.html"><i class="fa-solid fa-folder-open"></i> <span>Files</span></a>
        <a href="../timeline.html"><i class="fa-solid fa-calendar-alt"></i> <span>Timeline</span></a>
        <a href="../tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a>
        <a href="https://github.com/WEHBEMUMEN/internship-cnam" target="_blank" class="github-link btn btn-outline" style="padding: 10px 20px; font-size: 0.9rem;">
          <i class="fa-brands fa-github"></i> <span>GitHub</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div id="loading" class="loading-spinner">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading Weekly Log content...
    </div>
    <section id="content" style="display: none;">
      <div class="container">
        <div class="markdown-container">
          <div id="markdown-body" class="markdown-body"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 WEHBEMUMEN & LMSSC, Cnam.</p>
    </div>
  </footer>

  <script>
    async function fetchAndRender() {
      try {
        const response = await fetch('weekly_log.md');
        if (!response.ok) throw new Error('Could not fetch weekly_log.md');
        let text = await response.text();
        
        // Remove frontmatter if present
        text = text.replace(/^---[\s\S]*?---/, '');
        
        document.getElementById('markdown-body').innerHTML = marked.parse(text);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('content').style.display = 'block';
      } catch (error) {
        document.getElementById('loading').innerHTML = '<p>Error: ' + error.message + '</p>';
      }
    }
    
    fetchAndRender();
  </script>

</body>
</html>
