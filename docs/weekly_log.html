<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Log | Digital Twin & ROM</title>
  <link rel="stylesheet" href="../index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>
<body>

  <header>
    <div class="container header-container">
      <a href="../index.html" class="logo">
        <i class="fa-solid fa-cube"></i>
        <span>Digital Twin [ROM]</span>
      </a>
      <nav class="nav-links">
        <a href="../index.html"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a href="../theory/overview.html"><i class="fa-solid fa-file-invoice"></i> <span>Abstract</span></a>
        <a href="../theory/repository.html"><i class="fa-solid fa-folder-open"></i> <span>Files</span></a>
        <a href="../theory/timeline.html"><i class="fa-solid fa-calendar-alt"></i> <span>Timeline</span></a>
        <a href="../theory/tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a>
        <a href="https://github.com/WEHBEMUMEN/internship-cnam" target="_blank" class="github-link btn btn-outline" style="padding: 10px 20px; font-size: 0.9rem;">
          <i class="fa-brands fa-github"></i> <span>GitHub</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <div id="loading" class="loading-spinner">
      <i class="fa-solid fa-spinner fa-spin"></i> Loading Weekly Log content...
    </div>
    <section id="content" style="display: none;">
      <div class="container">
        <div class="markdown-container">
          <div id="markdown-body" class="markdown-body"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 WEHBE Mumen & EPN04, Cnam.</p>
    </div>
  </footer>

  <script>
    async function fetchAndRender() {
      const loadingEl = document.getElementById('loading');
      const contentEl = document.getElementById('content');
      const markdownBody = document.getElementById('markdown-body');

      try {
        console.log("Fetching weekly_log.md...");
        const response = await fetch('weekly_log.md');
        
        if (!response.ok) {
          throw new Error(`HTTP Error ${response.status}: Could not fetch weekly_log.md`);
        }
        
        let text = await response.text();
        console.log("Successfully fetched weekly_log.md, length:", text.length);
        
        // Remove frontmatter if present
        text = text.replace(/^---[\s\S]*?---/, '');
        
        // Ensure marked is available
        if (typeof marked === 'undefined') {
          throw new Error('Markdown parser (marked.js) failed to load. Please check your internet connection.');
        }

        markdownBody.innerHTML = marked.parse(text);
        loadingEl.style.display = 'none';
        contentEl.style.display = 'block';
        
        console.log("Weekly log rendered successfully.");
      } catch (error) {
        console.error("Weekly Log Error:", error);
        loadingEl.innerHTML = `
          <div style="color: #ef4444; padding: 20px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2);">
            <i class="fa-solid fa-circle-exclamation"></i> <strong>Failed to load log:</strong> ${error.message}
          </div>`;
      }
    }
    
    // Use window.onload to ensure all scripts (marked.js) are ready
    window.onload = fetchAndRender;
  </script>

</body>
</html>
