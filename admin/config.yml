backend:
  name: git-gateway
  branch: main

media_folder: "resources/uploads"
public_folder: "resources/uploads"

collections:
  - name: "links"
    label: "Download Links & Assets"
    files:
      - file: "_data/downloads.yml"
        label: "Manage File Links"
        name: "downloads"
        fields:
          - label: "Windows App Download Link (.zip or .exe)"
            name: "app_download"
            widget: "string"
          - label: "Core Presentation (PDF Link)"
            name: "core_pdf"
            widget: "string"
          - label: "Final Report (PDF Link)"
            name: "final_report"
            widget: "string"

  - name: "tasks"
    label: "Task Tracker"
    files:
      - file: "_data/tasks.yml"
        label: "Manage Project Tasks"
        name: "task_list"
        fields:
          - label: "Tasks"
            name: "tasks"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Status", name: "status", widget: "select", options: ["To Do", "In Progress", "Done"]}
              - {label: "Priority", name: "priority", widget: "select", options: ["Low", "Medium", "High"]}
              - {label: "Deadline", name: "deadline", widget: "datetime", type: "date", format: "YYYY-MM-DD", required: false}
              - {label: "Description", name: "description", widget: "markdown", required: false}

  - name: "docs"
    label: "Manuals & Logs"
    files:
      - file: "resources/reference_catalog.md"
        label: "Reference Catalog"
        name: "reference_catalog"
        fields:
          - {label: "Document Content", name: "body", widget: "markdown"}

  - name: "weekly_log"
    label: "Weekly Log"
    label_singular: "Week"
    folder: "_data/weeks"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Week Number", name: "week_number", widget: "number", hint: "e.g. 1, 2, 3..."}
      - {label: "Start Date", name: "start_date", widget: "datetime", type: "date", format: "YYYY-MM-DD"}
      - {label: "End Date", name: "end_date", widget: "datetime", type: "date", format: "YYYY-MM-DD"}
      - {label: "Primary Goal", name: "primary_goal", widget: "string"}
      - label: "Tasks"
        name: "tasks"
        widget: "list"
        fields:
          - {label: "Task", name: "task", widget: "string"}
          - {label: "Done?", name: "done", widget: "boolean", default: false}
      - {label: "Supervisor Meeting Date", name: "meeting_date", widget: "datetime", type: "date", format: "YYYY-MM-DD", required: false}
      - {label: "Questions to Ask", name: "questions", widget: "markdown", required: false}
      - {label: "Notes / Action Items", name: "notes", widget: "markdown", required: false}




