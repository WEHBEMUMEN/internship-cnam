<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Lab 2.1 | Surface Mapping</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 300px;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border: 1px solid #334155; border-radius: 16px; padding: 20px;
            z-index: 10; pointer-events: auto;
        }
        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; display: block; }
        .slider { width: 100%; height: 4px; background: #334155; border-radius: 2px; appearance: none; outline: none; }
        .slider::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: #3b82f6; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="text-blue-500">2.1</span> Surface Mapping Lab
        </h1>
        
        <div class="control-group">
            <span class="control-label">Surface Resolution</span>
            <input type="range" id="resolution-slider" class="slider" min="5" max="50" value="20">
            <div class="flex justify-between text-xs mt-1 text-slate-500">
                <span>Low</span>
                <span>High</span>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Visualization</span>
            <label class="flex items-center gap-2 cursor-pointer mb-2">
                <input type="checkbox" id="show-grid" checked>
                <span class="text-sm">Show Control Grid</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" id="show-wireframe" checked>
                <span class="text-sm">Show Wireframe</span>
            </label>
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <span class="control-label">Manipulation</span>
            <p class="text-xs text-slate-500 mb-3"><i class="fa-solid fa-mouse-pointer mr-1"></i> Click a point to move it in 3D.</p>
            <button id="reset-btn" class="w-100 py-2 px-4 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-bold transition-colors text-white mb-2">
                <i class="fa-solid fa-rotate-left mr-2"></i> Reset Surface
            </button>
        </div>

        <div class="mt-4 pt-6 border-t border-slate-800">
            <p class="text-xs text-slate-500 leading-relaxed">
                <strong>Mechanism:</strong> Bivariate NURBS mapping from $[0,1]^2$ parametric square to 3D. Manipulate the grid to see Jacobian distortion.
            </p>
        </div>
        
        <a href="../theory-2.1.html" class="mt-6 block text-center py-2 px-4 bg-slate-800 hover:bg-slate-700 rounded-lg text-sm transition-colors text-white no-underline">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back to Theory
        </a>
        <a href="../index.html" class="mt-2 block text-center py-2 px-4 border border-slate-700 hover:bg-slate-800 rounded-lg text-sm transition-colors text-slate-400 no-underline">
            <i class="fa-solid fa-house mr-2"></i> Simulation Hub
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="../phase-2-core/src/nurbs-2d.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
