<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Lab 2.5 | Differential Area & Jacobian</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #334155; border-radius: 16px; padding: 20px;
            z-index: 10; pointer-events: auto;
            max-height: calc(100vh - 40px); overflow-y: auto;
        }
        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; display: block; }
        .btn-action { 
            width: 100%; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.3); color: #fbbf24;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-action:hover { background: rgba(245, 158, 11, 0.25); transform: translateY(-1px); }
        
        #probe-overlay {
            position: absolute; bottom: 20px; right: 20px; width: 240px;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px);
            border: 1px solid #334155; border-radius: 12px; padding: 15px;
            z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .math-val { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; color: #fbbf24; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="text-amber-500">2.5</span> Jacobian Lab
        </h1>
        
        <div class="control-group">
            <span class="control-label">Geometric Preset</span>
            <button id="load-plane" class="w-full py-2 px-4 bg-emerald-600/20 hover:bg-emerald-600/40 border border-emerald-500/40 rounded-lg text-xs font-bold transition-all text-emerald-400 mb-2">
                Load 2D Plane
            </button>
            <button id="load-sphere" class="w-full py-2 px-4 bg-blue-600/20 hover:bg-blue-600/40 border border-blue-500/40 rounded-lg text-xs font-bold transition-all text-blue-400">
                Load Exact Sphere
            </button>
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <span class="control-label">Metric Visualization</span>
            <div class="flex flex-col gap-3 mt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="show-jacobian" checked>
                    <span class="text-xs">Jacobian Determinant Heatmap</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="show-normals">
                    <span class="text-xs">Show Surface Normals</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="show-grid" checked>
                    <span class="text-xs">Show Control Lattice</span>
                </label>
            </div>
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <span class="control-label">Mesh Resolution</span>
            <input type="range" id="resolution-slider" class="w-full mt-2" min="10" max="100" value="50">
            <p class="text-[10px] text-slate-500 mt-2 italic">Observation: Higher resolution reveals the smoothness of the Jacobian field.</p>
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <div class="bg-black/40 rounded p-3 text-[11px] font-mono text-amber-300">
                <div id="state-det-range">|J|: 0.1 to 15.2</div>
                <div id="state-points">Lattice: 9 x 5</div>
            </div>
        </div>
        
        <a href="../theory-2.5.html" class="mt-6 block text-center py-2 px-4 bg-amber-600/20 text-amber-400 border border-amber-500/30 rounded-lg text-sm font-bold no-underline transition-all hover:bg-amber-600/40">
            <i class="fa-solid fa-graduation-cap mr-2"></i> Jacobian Theory
        </a>
        <a href="../index.html" class="mt-2 block text-center py-2 px-4 border border-slate-700 hover:bg-slate-800 rounded-lg text-sm transition-colors text-slate-400 no-underline">
            <i class="fa-solid fa-house mr-2"></i> Simulation Hub
        </a>
    </div>

    <div id="probe-overlay">
        <h3 class="text-xs font-bold uppercase text-slate-500 mb-2">Local Metric State</h3>
        <div class="flex flex-col gap-2">
            <div class="flex justify-between text-[11px]">
                <span>Parametric:</span>
                <span id="p-coords" class="math-val">(0.5, 0.5)</span>
            </div>
            <div class="flex justify-between text-[11px]">
                <span>Det |J|:</span>
                <span id="p-det" class="math-val">12.45</span>
            </div>
            <div class="flex justify-between text-[11px]">
                <span>Normal:</span>
                <span id="p-normal" class="math-val">(0,0,1)</span>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="../shared/performance.js"></script>
    <script src="../phase-2-core/src/nurbs-2d.js"></script>
    <script src="../phase-2-core/src/nurbs-presets.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
