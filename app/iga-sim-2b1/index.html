<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Lab 2B.1 | Stiffness Matrix Assembly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; width: 320px;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            border: 1px solid #334155; border-radius: 16px; padding: 20px;
            z-index: 10; pointer-events: auto;
            max-height: calc(100vh - 40px); overflow-y: auto;
        }
        .control-group { margin-bottom: 20px; }
        .control-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 12px; display: block; }
        .btn-action { 
            width: 100%; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-action:hover { background: rgba(59, 130, 246, 0.25); transform: translateY(-1px); }
        .stat-card { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="ui-panel">
        <h1 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="text-blue-500">2B.1</span> Stiffness Lab
        </h1>
        
        <div class="control-group">
            <span class="control-label">Material Properties</span>
            <div class="flex flex-col gap-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs">Young's Modulus (E)</span>
                    <span id="e-val" class="text-xs font-mono text-blue-400">210 GPa</span>
                </div>
                <input type="range" id="e-slider" class="w-full" min="10" max="300" value="210">
                
                <div class="flex justify-between items-center">
                    <span class="text-xs">Poisson's Ratio (&nu;)</span>
                    <span id="nu-val" class="text-xs font-mono text-blue-400">0.3</span>
                </div>
                <input type="range" id="nu-slider" class="w-full" min="0" max="45" value="30">
            </div>
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <span class="control-label">Loading Conditions</span>
            <div class="flex justify-between items-center mb-2">
                <span class="text-xs">Tip Load (N)</span>
                <span id="load-val" class="text-xs font-mono text-red-400">100</span>
            </div>
            <input type="range" id="load-slider" class="w-full" min="0" max="1000" value="100">
        </div>

        <div class="control-group pt-4 border-t border-slate-700">
            <button id="solve-btn" class="btn-action">
                <i class="fa-solid fa-play"></i> Solve System
            </button>
        </div>

        <div class="stat-card">
            <span class="control-label">Analysis State</span>
            <div class="text-[10px] space-y-1 text-slate-400">
                <div class="flex justify-between"><span>Degrees of Freedom:</span> <span id="num-dofs" class="text-white">...</span></div>
                <div class="flex justify-between"><span>Max Displacement:</span> <span id="max-disp" class="text-blue-400 font-bold">...</span></div>
                <div class="flex justify-between"><span>Strain Energy (U):</span> <span id="strain-energy" class="text-amber-400 font-bold">...</span></div>
            </div>
        </div>
        
        <a href="../theory-2b1.html" class="mt-6 block text-center py-2 px-4 bg-blue-600/20 text-blue-400 border border-blue-500/30 rounded-lg text-sm font-bold no-underline transition-all hover:bg-blue-600/40">
            <i class="fa-solid fa-graduation-cap mr-2"></i> Stiffness Theory
        </a>
        <a href="../index.html" class="mt-2 block text-center py-2 px-4 border border-slate-700 hover:bg-slate-800 rounded-lg text-sm transition-colors text-slate-400 no-underline">
            <i class="fa-solid fa-house mr-2"></i> Simulation Hub
        </a>
    </div>

    <!-- Modals or performance overlay can be added as per Phase 2.4 -->
    <script src="../shared/performance.js"></script>
    <script src="../phase-2-core/src/nurbs-2d.js"></script>
    <script src="../phase-2-core/src/nurbs-presets.js"></script>
    <script src="../phase-2-core/src/iga-solver-2d.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
