<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Dictionary | Digital Twin & ROM</title>
  <link rel="stylesheet" href="index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body);"></script>
  <script src="scripts.js" defer></script>
  <style>
    /* PREMIUM LIGHT THEME */
    :root {
      --bg-page: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-sub: #475569;
      --accent-primary: #3b82f6;
      --accent-secondary: #8b5cf6;
      --border-color: #e2e8f0;
    }
    body {
      background-color: var(--bg-page);
      background-image: 
        radial-gradient(circle at 10% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 90%, rgba(139, 92, 246, 0.05) 0%, transparent 40%);
      color: var(--text-main);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .card {
      background: var(--card-bg);
      padding: 35px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.02);
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      display: flex; flex-direction: column;
    }
    .card h3 { color: var(--text-main); margin-bottom: 15px; font-weight: 800; font-size: 1.5rem; }
    .card p { color: var(--text-sub); line-height: 1.7; flex-grow: 1; margin-bottom: 0;}
    .card:hover { transform: translateY(-5px); border-color: rgba(59, 130, 246, 0.3); box-shadow: 0 15px 35px rgba(59, 130, 246, 0.08); }
    .card-link { color: var(--accent-primary); font-weight: 700; text-decoration: none; margin-top: 20px; display: inline-block; transition: gap 0.3s ease; }
    .card-link:hover { opacity: 0.8; }
    
    .badge { background: rgba(59, 130, 246, 0.1); color: var(--accent-primary); padding: 5px 12px; border-radius: 100px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; border: 1px solid rgba(59,130,246,0.2); }
    .section-title { font-size: 3rem; margin-bottom: 20px; font-weight: 900; background: linear-gradient(135deg, #1e293b 0%, #334155 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .section-sub { color: var(--text-sub); font-size: 1.2rem; }
    
    header { background: rgba(255, 255, 255, 0.9) !important; backdrop-filter: blur(12px) !important; border-bottom: 1px solid var(--border-color) !important; }
    .logo span { color: var(--text-main) !important; }
    .nav-links a { color: var(--text-sub) !important; }
    .nav-links a:hover, .nav-links a[style*="color: var(--accent)"] { color: var(--accent-primary) !important; }
    .footer { border-top: 1px solid var(--border-color); background: var(--bg-page); color: var(--text-sub); }
  </style>
</head>
<body>

  <header>
    <div class="container header-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-cube"></i>
        <span>Digital Twin [ROM]</span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="home-link"><i class="fa-solid fa-house"></i> <span>Home</span></a>
        <a href="overview.html"><i class="fa-solid fa-file-invoice"></i> <span>Abstract</span></a>
        <a href="repository.html"><i class="fa-solid fa-folder-open"></i> <span>Files</span></a>
        <a href="timeline.html"><i class="fa-solid fa-calendar-alt"></i> <span>Timeline</span></a>
        <a href="tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a>
        <a href="dictionary.html" style="color: var(--accent);"><i class="fa-solid fa-book-bookmark"></i> <span>Dictionary</span></a>
        <a href="https://github.com/WEHBEMUMEN/internship-cnam" target="_blank" class="github-link btn btn-outline" style="padding: 10px 20px; font-size: 0.9rem;">
          <i class="fa-brands fa-github"></i> <span>GitHub</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-head reveal reveal-up">
          <span class="badge">TERMS & DEFINITIONS</span>
          <h2 class="section-title">Project Dictionary</h2>
          <p class="section-sub">A comprehensive guide to the terminology and concepts used in this research.</p>
        </div>

        <div id="dictionary-grid" class="grid reveal reveal-up delay-1">
          <!-- Terms will be loaded here -->
          <div class="loading-msg">Loading terms...</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 WEHBE Mumen & EPN04, Cnam.</p>
    </div>
  </footer>

  <script>
    const TERMS = [
      { id: 'digital-twin', title: 'Digital Twin' },
      { id: 'reduced-order-modelling', title: 'Reduced Order Modelling' },
      { id: 'isogeometric-analysis', title: 'Isogeometric Analysis' },
      { id: 'nurbs', title: 'NURBS' },
      { id: 'b-splines', title: 'B-Splines (Basis Splines)' },
      { id: 'knots', title: 'Knots' },
      { id: 'meshing', title: 'Meshing' },
      { id: 'finite-element-method', title: 'Finite Element Method' },
      { id: 'continuum-mechanics', title: 'Continuum Mechanics' },
      { id: 'hyper-reduction', title: 'Hyper-reduction' },
      { id: 'fsi', title: 'Fluid-Structure Interaction' },
      { id: 'nonlinear-dynamics', title: 'Nonlinear Dynamics' },
      { id: 'large-displacements', title: 'Large Displacements' },
      { id: 'epn04', title: 'EPN04' },
      { id: 'cnam', title: 'Cnam' }
    ];

    async function loadTerms() {
      const grid = document.getElementById('dictionary-grid');
      grid.innerHTML = '';

      for (const term of TERMS) {
        try {
          const res = await fetch(`_data/dictionary/${term.id}.json`);
          const data = await res.json();
            grid.innerHTML += `
              <div class="card reveal reveal-up">
                <span class="badge" style="font-size: 0.7rem; margin-bottom: 10px;">${data.category}</span>
                <h3>${data.title}</h3>
                <p>${data.body.replace(/\$\$.*?\$\$/g, '').replace(/\$.*?\$/g, '').replace(/\*\*/g, '').substring(0, 180)}...</p>
                <a href="term.html?id=${term.id}" class="card-link">Read more <i class="fa-solid fa-arrow-right"></i></a>
              </div>
            `;
        } catch (e) {
          console.error(`Failed to load term: ${term.id}`, e);
        }
      }

      const renderMath = () => {
        if (window.renderMathInElement) {
          renderMathInElement(grid, {
            delimiters: [
              {left: '$$', right: '$$', display: true},
              {left: '$', right: '$', display: false},
              {left: '\\(', right: '\\)', display: false},
              {left: '\\[', right: '\\]', display: true}
            ]
          });
        } else {
          setTimeout(renderMath, 100);
        }
      };
      renderMath();

      if (window.initRevealAnimations) {
        window.initRevealAnimations();
      }
    }

    loadTerms();
  </script>

</body>
</html>
